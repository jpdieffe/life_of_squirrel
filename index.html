<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life of Squirrel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── Full-screen canvas ── */
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      outline: none;
    }

    /* ── Lobby overlay ── */
    #lobby {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      z-index: 20;
    }

    .card {
      background: #12122a;
      border: 1px solid #353570;
      border-radius: 14px;
      padding: 2rem 2.2rem;
      width: min(360px, 90vw);
      color: #e0e0f0;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }

    .card h1 {
      font-size: 2rem;
      color: #7eb8ff;
      letter-spacing: -0.02em;
    }

    .card .subtitle {
      color: #7070a0;
      font-size: 0.85rem;
      margin: 0.3rem 0 1.5rem;
    }

    /* buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn:hover  { filter: brightness(1.15); }
    .btn:active { filter: brightness(0.9); }
    .btn-blue  { background: #3a82d6; color: #fff; }
    .btn-green { background: #3a9e5a; color: #fff; margin-top: 0.5rem; }

    /* room code display */
    .room-row {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: #8080b0;
    }

    #roomCode {
      display: inline-block;
      margin-top: 0.3rem;
      padding: 0.35rem 0.7rem;
      background: #08081c;
      border: 1px solid #353570;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      color: #7eb8ff;
      word-break: break-all;
      user-select: all;
      cursor: text;
    }

    /* divider */
    .or {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.1rem 0;
      color: #404060;
      font-size: 0.8rem;
    }
    .or::before, .or::after {
      content: '';
      flex: 1;
      border-top: 1px solid #282848;
    }

    /* text input */
    input[type="text"] {
      display: block;
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #08081c;
      border: 1px solid #353570;
      border-radius: 9px;
      color: #e0e0f0;
      font-size: 0.95rem;
      font-family: monospace;
      outline: none;
      margin-bottom: 0.5rem;
    }
    input[type="text"]:focus { border-color: #7eb8ff; }
    input[type="text"]::placeholder { color: #404060; }

    #status {
      margin-top: 1rem;
      min-height: 1.2em;
      font-size: 0.82rem;
      color: #8080b0;
    }

    /* ── HUD (shown once game starts) ── */
    #hud {
      position: fixed;
      bottom: 0.9rem;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      color: rgba(255, 255, 255, 0.42);
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    /* ── Connection badge ── */
    #connBadge {
      display: none;
      position: fixed;
      top: 0.8rem;
      right: 0.9rem;
      background: rgba(40, 180, 80, 0.85);
      color: #fff;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      pointer-events: none;
      z-index: 30;
    }
    /* ── Character label - removed ── */

    /* ── Debug panel (~ key) ── */
    #debugPanel {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      z-index: 25;
    }
    .debug-card {
      background: #12122a;
      border: 1px solid #353570;
      border-radius: 14px;
      padding: 1.5rem 2rem;
      width: min(280px, 90vw);
      color: #e0e0f0;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    .debug-card h2 {
      font-size: 1.3rem;
      color: #7eb8ff;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas" tabindex="0"></canvas>

  <!-- Lobby overlay -->
  <div id="lobby">
    <div class="card">
      <h1>Life of Squirrel</h1>
      <p class="subtitle">2-player &bull; Browser P2P &bull; No install</p>

      <!-- Host side -->
      <button class="btn btn-blue" id="hostBtn">Host Game</button>
      <div class="room-row">
        Room code:<br>
        <span id="roomCode" title="Click to select, then copy">—</span>
      </div>

      <div class="or">or</div>

      <!-- Join side -->
      <input id="roomInput" type="text" placeholder="Paste friend's room code" autocomplete="off" spellcheck="false" />
      <button class="btn btn-green" id="joinBtn">Join Game</button>

      <div id="status"></div>
    </div>
  </div>

  <!-- Debug panel (toggle with ~) -->
  <div id="debugPanel" style="display:none">
    <div class="debug-card">
      <h2>Debug Menu</h2>
      <button class="btn btn-blue" id="debugSwitchChar">Switch to Sea Gull</button>
      <button class="btn" id="debugClose" style="margin-top:0.6rem; background:#2a2a4a;">Close</button>
    </div>
  </div>

  <!-- Connected badge -->
  <div id="connBadge">● Connected</div>

  <!-- Controls hint -->
  <div id="hud">
    WASD / Arrows &nbsp;&middot;&nbsp; Space / E to jump &nbsp;&middot;&nbsp; Shift to sneak &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Click to capture mouse &nbsp;&middot;&nbsp; ` to release &nbsp;&middot;&nbsp; ~ for debug
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
