<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rooftop Runners — Map Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; color: #e0e0f0; }

    /* ── Layout ── */
    #app { display: flex; width: 100vw; height: 100vh; }

    /* ── Sidebar ── */
    #sidebar {
      width: 230px;
      min-width: 230px;
      background: #12122a;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
    }
    #sidebar h1 {
      font-size: 0.95rem;
      font-weight: 800;
      color: #7eb8ff;
      padding: 0.9rem 1rem 0.5rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #2a2a4a;
    }
    .section { padding: 0.6rem 0.8rem; border-bottom: 1px solid #1e1e3a; }
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      color: #6060a0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.45rem;
    }

    /* Tool buttons */
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.42rem 0.55rem;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #b0b0d0;
      font-size: 0.82rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      margin-bottom: 2px;
    }
    .tool-btn:hover { background: #1e1e3e; color: #e0e0ff; }
    .tool-btn.active {
      background: #1e3058;
      border-color: #3a82d6;
      color: #7eb8ff;
    }
    .tool-icon { font-size: 1rem; line-height: 1; flex-shrink: 0; }

    /* Property fields */
    .prop-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem; }
    .prop-row label { font-size: 0.76rem; color: #8080a8; width: 60px; flex-shrink: 0; }
    .prop-row input {
      flex: 1;
      background: #08081c;
      border: 1px solid #353570;
      border-radius: 5px;
      color: #e0e0f0;
      font-size: 0.8rem;
      padding: 0.22rem 0.4rem;
    }
    .prop-row input:focus { outline: none; border-color: #7eb8ff; }

    /* Select / Erase mode colour hints */
    #tool-select.active { border-color: #50c878; color: #50c878; background: #0e2018; }
    #tool-erase.active  { border-color: #e05050; color: #ff7070; background: #220e0e; }

    /* Action buttons */
    .action-btn {
      display: block;
      width: 100%;
      padding: 0.5rem 0.6rem;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 0.35rem;
      transition: filter 0.15s;
    }
    .action-btn:hover  { filter: brightness(1.15); }
    .action-btn:active { filter: brightness(0.85); }
    .btn-blue   { background: #3a82d6; color: #fff; }
    .btn-green  { background: #3a9e5a; color: #fff; }
    .btn-yellow { background: #c8a820; color: #1a1a00; }
    .btn-red    { background: #c03030; color: #fff; }

    /* Property panel at bottom of sidebar */
    #prop-panel { padding: 0.6rem 0.8rem; flex: 1; }
    #prop-panel .section-title { margin-bottom: 0.5rem; }
    #prop-panel p { font-size: 0.76rem; color: #5050808; margin-top: 0.3rem; }
    #prop-none { font-size: 0.76rem; color: #50507a; font-style: italic; margin-top: 0.3rem; }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #mapCanvas {
      display: block;
      cursor: crosshair;
    }
    #canvas-info {
      position: absolute;
      bottom: 0.6rem;
      right: 0.8rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
    #cursor-coords {
      position: absolute;
      top: 0.6rem;
      left: 0.8rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      font-family: monospace;
    }
  </style>
  <script type="module" crossorigin src="./assets/editor-Be7vvT3c.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-Cf3xff8G.js">
</head>
<body>
<div id="app">
  <!-- ── Sidebar ────────────────────────────────────────────── -->
  <aside id="sidebar">
    <h1>🗺 Map Editor</h1>

    <!-- Modes -->
    <div class="section">
      <div class="section-title">Mode</div>
      <button class="tool-btn active" id="tool-select" data-tool="select">
        <span class="tool-icon">↖</span> Select / Move
      </button>
      <button class="tool-btn" id="tool-erase" data-tool="erase">
        <span class="tool-icon">✕</span> Erase
      </button>
    </div>

    <!-- Buildings -->
    <div class="section">
      <div class="section-title">Place Building</div>
      <div class="prop-row"><label>W</label><input id="b-width"  type="number" value="6"  min="1" step="1"></div>
      <div class="prop-row"><label>D</label><input id="b-depth"  type="number" value="6"  min="1" step="1"></div>
      <div class="prop-row"><label>H</label><input id="b-height" type="number" value="5"  min="1" step="1"></div>
      <button class="tool-btn" id="tool-building" data-tool="building">
        <span class="tool-icon">🏗</span> Place Building
      </button>
    </div>

    <!-- Structures -->
    <div class="section">
      <div class="section-title">Place Structure</div>
      <button class="tool-btn" id="tool-tree1"  data-tool="tree1">
        <span class="tool-icon">🌲</span> Tree 1
      </button>
      <button class="tool-btn" id="tool-tree2"  data-tool="tree2">
        <span class="tool-icon">🌳</span> Tree 2
      </button>
      <button class="tool-btn" id="tool-house"  data-tool="house">
        <span class="tool-icon">🏠</span> House
      </button>
      <button class="tool-btn" id="tool-house1" data-tool="house1">
        <span class="tool-icon">🏡</span> House 1
      </button>
    </div>

    <!-- Spawn points -->
    <div class="section">
      <div class="section-title">Spawn Points</div>
      <button class="tool-btn" id="tool-player-spawn" data-tool="player-spawn">
        <span class="tool-icon">👤</span> Player Spawn
      </button>
      <div class="section-title" style="margin-top:0.5rem;">Monster Spawns</div>
      <button class="tool-btn" id="tool-slime"   data-tool="slime"><span class="tool-icon">🟢</span> Slime</button>
      <button class="tool-btn" id="tool-spider"  data-tool="spider"><span class="tool-icon">🕷</span> Spider</button>
      <button class="tool-btn" id="tool-wolf"    data-tool="wolf"><span class="tool-icon">🐺</span> Wolf</button>
      <button class="tool-btn" id="tool-goblin"  data-tool="goblin"><span class="tool-icon">👺</span> Goblin</button>
      <button class="tool-btn" id="tool-imp"     data-tool="imp"><span class="tool-icon">😈</span> Imp</button>
      <button class="tool-btn" id="tool-orc"     data-tool="orc"><span class="tool-icon">👹</span> Orc</button>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="section-title">Map</div>
      <button class="action-btn btn-green"  id="btn-save">💾 Save Map</button>
      <button class="action-btn btn-blue"   id="btn-load">📂 Load Map</button>
      <button class="action-btn btn-yellow" id="btn-export">📋 Copy JSON</button>
      <button class="action-btn btn-red"    id="btn-clear">🗑 Clear All</button>
      <input id="file-input" type="file" accept=".json" style="display:none">
      <a href="./index.html" class="action-btn btn-green" style="display:block;text-align:center;text-decoration:none;margin-top:8px">▶ Play Map</a>
    </div>

    <!-- Selected object properties -->
    <div id="prop-panel">
      <div class="section-title">Properties</div>
      <div id="prop-none">Nothing selected</div>
      <div id="prop-fields" style="display:none">
        <div class="prop-row"><label>X</label><input id="prop-x" type="number" step="0.5"></div>
        <div class="prop-row"><label>Z</label><input id="prop-z" type="number" step="0.5"></div>
        <div id="prop-building-fields">
          <div class="prop-row"><label>W</label><input id="prop-w" type="number" step="0.5" min="1"></div>
          <div class="prop-row"><label>D</label><input id="prop-d" type="number" step="0.5" min="1"></div>
          <div class="prop-row"><label>H</label><input id="prop-h" type="number" step="0.5" min="1"></div>
        </div>
        <div id="prop-rotation-field">
          <div class="prop-row"><label>Rot°</label><input id="prop-rot" type="number" step="15" min="-360" max="360"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Canvas ──────────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="mapCanvas"></canvas>
    <div id="cursor-coords">X: 0  Z: 0</div>
    <div id="canvas-info">Scroll to zoom · Middle-drag or right-drag to pan · Click to place / select</div>
  </div>
</div>

</body>
</html>
